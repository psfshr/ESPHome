##############################################################################################################################################################
# BASE DEVICE CONFIG #########################################################################################################################################
##############################################################################################################################################################

substitutions:
  name: waveshare-touch7-ab5204
  friendly_name: WaveShare Touch7 LCD ab5204

packages:
  - !include common/package_connectivity.yaml
  - !include common/package_ha_base.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_upload.maximum_ram_size: 524288
    board_build.flash_size: 8MB

  on_boot:
    - priority: 500
      then:
        - delay: 5s
        - lvgl.widget.hide: boot_screen
        - lvgl.page.show:
            id: first_page

  includes:
    - includes/weather_icons.h

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"

      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHFREQ_120M: "y" #[should align with PSRAM]
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_IDF_EXPERIMENTAL_FEATURES: "y"
      CONFIG_SPIRAM_SPEED_120M: "y" #[should align with FLASH]
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_COMPILER_OPTIMIZATION_PERF: "y"

      CONFIG_LV_MEM_CUSTOM: "y"
      CONFIG_LV_MEMCPY_MEMSET_STD: "y"
      CONFIG_LV_ATTRIBUTE_FAST_MEM: "y"
    advanced:
      enable_idf_experimental_features: true

psram:
  mode: octal
  speed: 120MHz


################################################################################

# Wifi information
wifi:
#  use_address: ${name}.tgv.home
  on_connect:
    - lvgl.widget.show: header_lbl_wifistatus
  on_disconnect:
    - lvgl.widget.hide: header_lbl_wifistatus

# Enable Home Assistant API
api:
  on_client_connected:
    - lvgl.widget.show: header_lbl_hastatus
  on_client_disconnected:
    - lvgl.widget.hide: header_lbl_hastatus

# Enable logging
logger:
  hardware_uart: uart0
#  level: VERBOSE


##############################################################################################################################################################
# INPUTS & OUTPUTS ###########################################################################################################################################
##############################################################################################################################################################

i2c:
  sda: GPIO08
  scl: GPIO09
  scan: True
  id: bus_a

ch422g:
  - id: ch422g_hub

##############################################################################################################################################################
# VARIABLES & SCRIPTS ########################################################################################################################################
##############################################################################################################################################################

script:
  - id: go_to_sleep
    then:
      - if:
          condition:
            - not:
                lvgl.is_paused
          then:
            - logger.log: "LVGL is idle"
            - switch.turn_off: display_backlight
            - lvgl.pause:
                show_snow: true

  - id: wake_from_sleep
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.page.show:
                id: first_page
            - lvgl.widget.redraw:
            - switch.turn_on: display_backlight
      - if:
          condition:
            lambda: 'return id(enpower_122524000124_grid_status).state;'
          then:
            - logger.log: "HA Sensor is ON, performing action..."
            - lvgl.led.update:
                id: led_solar_grid_status
                color: 0x00FF00
          else:
            - logger.log: "HA Sensor is OFF, performing alternative..."
            - lvgl.led.update:
                id: led_solar_grid_status
                color: 0xFF0000

##############################################################################################################################################################
# HOME ASSISTANT BUTTONS #####################################################################################################################################
##############################################################################################################################################################

button:
  - platform: template
    name: Go Sleep
    id: go_sleep
    icon: "mdi:emoticon-outline"
    on_press:
      - logger.log: "Button pressed"
      - script.execute: go_to_sleep
  - platform: template
    name: Wake Up
    id: wake_up
    icon: "mdi:emoticon-outline"
    on_press:
      - logger.log: "Button pressed"
      - script.execute: wake_from_sleep



switch:    
  - platform: gpio
    id: display_backlight
    name: Display Backlight
    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: false
    restore_mode: ALWAYS_ON


##############################################################################################################################################################
# SENSORS ####################################################################################################################################################
##############################################################################################################################################################

##############################################################################
# BINARY SENSORS #############################################################
##############################################################################

binary_sensor:

  - platform: homeassistant
    entity_id: binary_sensor.192_168_12_41
    id: conn_192_168_12_41
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return id(conn_192_168_12_41).state;'
            then:
              - logger.log: "HA Sensor is ON, performing action..."
              - lvgl.led.update:
                  id: led_solar_connection_status
                  color: 0x00FF00
            else:
              - logger.log: "HA Sensor is OFF, performing alternative..."
              - lvgl.led.update:
                  id: led_solar_connection_status
                  color: 0xFF0000

  - platform: homeassistant
    entity_id: binary_sensor.enpower_122524000124_grid_status
    id: enpower_122524000124_grid_status
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return id(enpower_122524000124_grid_status).state;'
            then:
              - logger.log: "HA Sensor is ON, performing action..."
              - lvgl.led.update:
                  id: led_solar_grid_status
                  color: 0x00FF00
            else:
              - logger.log: "HA Sensor is OFF, performing alternative..."
              - lvgl.led.update:
                  id: led_solar_grid_status
                  color: 0xFF0000


##############################################################################
# TEXT SENSORS ###############################################################
##############################################################################

text_sensor:

  - platform: homeassistant
    entity_id: sensor.timeofday_greeting
    id: timeofday_greeting
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_header_greeting
            text: !lambda return "Good " + id(timeofday_greeting).state;

  # Weather Sensors - Now
  - platform: homeassistant
    entity_id: sensor.weather_now
    id: weather_now

  # Weather Sensors - Daily
  - platform: homeassistant
    entity_id: sensor.weather_forecast_daily
    attribute: condition0
    id: daily_forecast_condition0
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_icon_large
            text: !lambda return weather_icon(x);
            text_color: !lambda return weather_color(x);

  - platform: homeassistant
    entity_id: sensor.weather_forecast_daily
    attribute: condition1
    id: daily_forecast_condition1

  # Power Sensors
  - platform: homeassistant
    entity_id: sensor.envoy_current_power_production_state
    id: envoy_current_power_production_state
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_solar_state
            text: !lambda return id(envoy_current_power_production_state).state;

  - platform: homeassistant
    entity_id: sensor.envoy_battery_combined_state
    id: envoy_battery_combined_state
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_battery_state
            text: !lambda return id(envoy_battery_combined_state).state;

  - platform: homeassistant
    entity_id: sensor.envoy_net_power_import_export_state
    id: envoy_net_power_import_export_state
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_grid_state
            text: !lambda return id(envoy_net_power_import_export_state).state;


