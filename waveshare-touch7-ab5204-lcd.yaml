##############################################################################################################################################################
# DISPLAY ####################################################################################################################################################
##############################################################################################################################################################

touchscreen:
  - platform: gt911
    id: my_touchscreen
    interrupt_pin: GPIO4
    reset_pin:
      ch422g: ch422g_hub
      number: 1
      mode: OUTPUT
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: false
#    on_touch:
#      - lambda: |-
#            ESP_LOGI("Touch:touch : ", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
#                touch.x, touch.y, touch.x_raw, touch.y_raw);
    on_release:
      - script.execute: wake_from_sleep

# Define display
display:
  - platform: mipi_rgb
    id: my_display
    model: ESP32-S3-TOUCH-LCD-7-800X480
    update_interval: never
    auto_clear_enabled: false


##############################################################################################################################################################
# LVGL #######################################################################################################################################################
##############################################################################################################################################################

lvgl:
  #log_level: none #INFO
  #color_depth: 16
  #buffer_size: 25%
  #width: 800
  #height: 480
  #align: center
  rotation: 180

  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  on_idle:
    - timeout: 1min
      then:
        - lvgl.page.show: first_page
    # - timeout: 15min
    #   then:
    #     - script.execute: go_to_sleep

  theme:
    label:
      text_font: montserrat_20
    button:
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_color: 0x0077b3
      border_width: 1
      text_color: 0xFFFFFF
      pressed: # set some button colors to be different in pressed state
        bg_color: 0x006699
        bg_grad_color: 0x00334d
      checked: # set some button colors to be different in checked state
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        text_color: 0xfff300
    buttonmatrix:
      bg_opa: TRANSP
      border_color: 0x0077b3
      border_width: 0
      text_color: 0xFFFFFF
      pad_all: 0
      items: # set all your buttonmatrix buttons to use your custom defined styles and font
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF
        #text_font: montserrat_20
        text_font: mdi_general_glyphs_medium
        pressed:
          bg_color: 0x006699
          bg_grad_color: 0x00334d
        checked:
          bg_color: 0x1d5f96
          bg_grad_color: 0x03324A
          text_color: 0x005580
    switch:
      bg_color: 0xC0C0C0
      bg_grad_color: 0xb0b0b0
      bg_grad_dir: VER
      bg_opa: COVER
      checked:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0xFFFFFF
        bg_grad_color: 0xC0C0C0
        bg_grad_dir: VER
        bg_opa: COVER
    slider:
      border_width: 1
      border_opa: 15%
      bg_color: 0xcccaca
      bg_opa: 15%
      indicator:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF


  style_definitions:
    - id: style_page_header
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 50
      text_font: montserrat_24
    - id: style_page_grid
      x: 0
      y: 0
      width: 790
      height: 370
      align: CENTER
      bg_color: 0xFFFFFF
      #bg_opa: TRANSP
      border_width: 1
      pad_all: 0
    - id: style_obj_in_grid
      grid_cell_x_align: STRETCH
      grid_cell_y_align: STRETCH
      border_width: 1

  bottom_layer:
    widgets:
      - obj:
          id: base_layer
          x: 0
          y: 0
          height: 100%
          width: 100%
          align: CENTER
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0

  top_layer:
    widgets:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          height: 100%
          width: 100%
          align: CENTER
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - spinner:
                align: CENTER
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen

      - obj:
          id: icon_area
          styles: style_page_header
          width: 100%
          pad_left: 20px
          pad_right: 20px
          pad_top: 10px
          border_width: 0
          layout:
            type: FLEX
            flex_flow: ROW
            flex_align_main: space_between
            flex_align_cross: center
            pad_column: 20px
          widgets:
            - label:
                text: "Hello"
                id: lbl_header_greeting
                flex_grow: 1
                align: left_mid
            - label:
                text: "\uF015" # HA Connectivity Icon
                id: header_lbl_hastatus
                align: center
            - label:
                text: "\uF1EB" # WiFI Connectivity Icon
                id: header_lbl_wifistatus
                align: center

      - buttonmatrix:
          align: bottom_mid
          styles: style_page_header
          pad_all: 0
          outline_width: 0
          id: button_matrix
          text_font: mdi_general_glyphs_medium
#          items:
#            styles: style_page_header
          rows:
            - buttons:
              - id: first_page_btn
                text: "\U000F02DC" # home
                on_click:
                  then:
                    - logger.log: "First button pressed"
                    - lvgl.page.show: first_page
              - id: second_page_btn
                text: "\U000F0599" # weather-sunny
                on_click:
                  then:
                    - logger.log: "Second button pressed"
                    - lvgl.page.show: second_page
              - id: third_page_btn
                text: "\U000F070D" # robot-vacuum
                on_click:
                  then:
                    - logger.log: "Third button pressed"
                    - lvgl.page.show: third_page
              - id: fourth_page_btn
                text: "\U000F1903" # home-lightning-bolt
                on_click:
                  then:
                    - logger.log: "Fourth button pressed"
                    - lvgl.page.show: fourth_page
              - id: fifth_page_btn
                text: "\U000F056E" # view-dashboard
                on_click:
                  then:
                    - logger.log: "Fifth button pressed"
                    - lvgl.page.show: fifth_page


