###############################################################################
# NOTES #######################################################################
###############################################################################

# https://www.waveshare.com/e-paper-esp32-driver-board.htm
# https://www.waveshare.com/wiki/E-Paper_ESP32_Driver_Board
# https://files.waveshare.com/upload/8/80/E-Paper_ESP32_Driver_Board_Schematic.pdf

# Can't use GPIO 13, 14, 15, 25, 26, 27 as they're on the ePaper connector

# https://esphome.io/components/i2c
# https://esphome.io/components/uart

# https://esphome.io/components/sensor/ld2420


###############################################################################
# BASE DEVICE CONFIG ##########################################################
###############################################################################

substitutions:
  name: waveshare-epaper-b410c4
  friendly_name: Photo SmartFrame b410c4

  image_url: "http://lundy.tgv.home:5000/image.bmp"

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

###############################################################################

# Wifi information
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${name}
    password: ${name}
  power_save_mode: NONE
#  use_address: ${name}.tgv.home
  on_connect: 
    then:
      - logger.log: "Updating image"
      - script.execute: fetch_and_display

api:

ota:
  platform: esphome

# Enable logging
logger:
#  level: VERBOSE #DEBUG

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

###############################################################################
# INPUTS / OUTPUTS / MODULES ##################################################
###############################################################################

online_image:
  - url: "${image_url}"
    id: frame_image
    format: bmp #png #bmp
    buffer_size: 65536
    type: BINARY
    #resize: 800x480
    on_download_finished:
      then:
        - logger.log: "Image downloaded, updating display..."
        - component.update: eink_display
    on_error:
      then:
        - logger.log: "Image download FAILED"

# Pins for Waveshare ePaper ESP Board
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO14

uart:
  id: ld2420_uart
  tx_pin: GPIO23
  rx_pin: GPIO22
  baud_rate: 115200
  parity: NONE
  stop_bits: 1

output:
  - platform: gpio
    pin:
      number: GPIO2
      mode: output
    id: LED

ld2420:

###############################################################################
# VARIABLES & SCRIPTS #########################################################
###############################################################################

# Global variables for detecting if the display needs to be refreshed
globals:
  - id: data_updated
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: initial_data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: time_since_refresh
    type: int
    restore_value: no
    initial_value: '0'
  - id: recorded_display_refresh
    type: int
    restore_value: yes
    initial_value: '0'

number:
  - platform: ld2420
    presence_timeout:
      name: mmWave Presence Timeout
    min_gate_distance:
      name: mmWave Gate Minimum
    max_gate_distance:
      name: mmWave Gate Maximum
    gate_select:
      name: mmWave Gate Select
    still_threshold:
      name: mmWave Still Threshold Value
    move_threshold:
      name: mmWave Move Threshold Value

script:
  - id: fetch_and_display
    then:
      - logger.log: "Fetching image from Home Assistant..."
      - online_image.set_url:
          id: frame_image
          url: "${image_url}"
      - component.update: frame_image

# Check whether the display needs to be refreshed
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Synchronized system clock"
    on_time:

      - seconds: 0
        minutes: /1
        then:
          - logger.log: "Updating image"
          - script.execute: fetch_and_display

###############################################################################
# HOME ASSISTANT BUTTONS ######################################################
###############################################################################

button:
  - platform: shutdown
    name: ESP32 Shutdown
  - platform: restart
    name: ESP32 Restart
  - platform: safe_mode
    name: ESP32 Restart (Safe Mode)
  - platform: template
    name: ESP32 Refresh Screen
    entity_category: config
    on_press:
      - script.execute: fetch_and_display

  - platform: ld2420
    apply_config:
      name: mmWave Apply Config
    factory_reset:
      name: mmWave Factory Reset
    restart_module:
      name: mmWave Restart
    revert_config:
      name: mmWave Undo

select:
  - platform: ld2420
    operating_mode:
      name: mmWave Mode

switch:
  - platform: factory_reset
    name: ESP32 Factory Reset

###############################################################################
# BINARY SENSORS ##############################################################
###############################################################################

binary_sensor:
  - platform: status
    name: ESP32 Status

  - platform: ld2420
    has_target:
      name: mmWave Presence
      id: mmwave_presence

###############################################################################
# TEXT SENSORS ################################################################
###############################################################################

text_sensor:
  - platform: ld2420
    fw_version:
      name: LD2420 Firmware


###############################################################################
# GENERAL SENSORS #############################################################
###############################################################################

sensor:
    #Device UPTIME
  - platform: uptime
    name: ESP32 Uptime
    id: sys_uptime
    update_interval: 60s

  - platform: ld2420
    moving_distance:
      name : mmWave Moving Distance
      filters:
        - throttle_average: 15s
        - filter_out: nan

  # Device Sensors - for monitoring device remotely
  - platform: template
    name: Display Last Update
    device_class: timestamp
    entity_category: "diagnostic"
    id: display_last_update
    
  - platform: template
    name: Display Num Refresh
    accuracy_decimals: 0
    unit_of_measurement: "Refreshes"
    state_class: "total_increasing"
    entity_category: "diagnostic"
    lambda: 'return id(recorded_display_refresh);'
  
  - platform: wifi_signal
    name: ESP32 WiFi Signal
    id: wifisignal
    unit_of_measurement: "dBm"
    entity_category: "diagnostic"
    update_interval: 60s


###############################################################################
# DISPLAY RENDERING ###########################################################
###############################################################################

# Now render everything on the ePaper screen
display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    busy_pin:
      number: 25
      inverted: True
    reset_pin: GPIO26
    reset_duration: 2ms
    model: 7.50inV2
    update_interval: never
    #rotation: 180°
    lambda: |-
      int panel_x = it.get_width();
      int panel_y = it.get_height();
      int panel_x_12 = panel_x / 2;
      int panel_y_12 = panel_y / 2;

      //it.fill(COLOR_ON);
      it.image(0, 0, id(frame_image), COLOR_OFF, COLOR_ON);
      //it.filled_circle(panel_x_12, panel_y_12, 100, COLOR_ON);
      ESP_LOGD("display", "Image displayed successfully");
